name: scripture_memorizer
description: Scripture Memorizer App — memorize Bible verses with TTS and practice modes.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  cloud_functions: ^5.2.1

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Networking & Bible API
  dio: ^5.7.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3

  # Text-to-Speech
  flutter_tts: ^4.2.0

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.7
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: 2.4.0
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_logo.png
  adaptive_icon_background: "#2D5043"
  adaptive_icon_foreground: assets/images/app_logo.png
  min_sdk_android: 21
  web:
    generate: true
    image_path: assets/images/app_logo.png
    background_color: "#2D5043"
    theme_color: "#2D5043"
  windows:
    generate: true
    image_path: assets/images/app_logo.png
    icon_size: 256

flutter_native_splash:
  color: "#2D5043"
  image: assets/images/app_logo.png
  android_12:
    color: "#2D5043"
    image: assets/images/app_logo.png
  web: true
  android: true
  ios: true
